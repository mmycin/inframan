name: Question
description: Ask a question about using InfraMan
title: "[QUESTION] <title>"
labels: ["question"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what you want to know.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about your question here.
